```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox - Penyimpanan Media</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styling */
        header {
            width: 100%;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Content */
        main {
            width: 100%;
            max-width: 1000px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px dashed #D1D5DB;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background-color: #F8FAFC;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            color: white;
            background-color: var(--primary);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Gallery Section */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #E5E7EB;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .media-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            animation: fadeIn 0.5s ease-out;
        }

        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .media-card img, .media-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background-color: #000;
        }

        .media-info {
            padding: 1rem;
        }

        .media-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-type {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            text-transform: uppercase;
        }

        .delete-btn {
            margin-top: 10px;
            background-color: #EF4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
            transition: background-color 0.2s;
        }
        
        .delete-btn:hover {
            background-color: #DC2626;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background-color: #E5E7EB;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>☁️ CloudBox</h1>
        <p>Demo Penyimpanan Media Berbasis Cloud</p>
    </header>

    <main>
        <!-- Area Upload -->
        <section class="upload-section">
            <div class="upload-icon">📁</div>
            <h2>Unggah File Anda</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Mendukung format gambar (JPG, PNG) dan Video (MP4)</p>
            
            <div class="upload-btn-wrapper">
                <button class="btn">Pilih Foto / Video</button>
                <!-- Input ini menerima multiple files (bisa pilih banyak sekaligus) -->
                <input type="file" id="mediaUpload" accept="image/*, video/*" multiple />
            </div>
        </section>

        <!-- Area Galeri -->
        <section>
            <div class="gallery-header">
                <h2>Galeri Tersimpan <span style="font-size: 0.8rem; color: #6B7280; font-weight: normal;">(Tersimpan di Browser LocalStorage)</span></h2>
                <span id="fileCount" style="color: var(--primary); font-weight: bold;">0 File</span>
            </div>
            
            <div class="gallery-grid" id="galleryGrid">
                <!-- Konten akan diisi otomatis oleh JavaScript -->
            </div>
        </section>
    </main>

    <script>
        const mediaUpload = document.getElementById('mediaUpload');
        const galleryGrid = document.getElementById('galleryGrid');
        const fileCountDisplay = document.getElementById('fileCount');
        
        // 1. Mengambil data yang sudah tersimpan di localStorage saat halaman dimuat
        let savedMedia = JSON.parse(localStorage.getItem('cloudbox_media')) || [];

        // 2. Fungsi untuk menampilkan galeri ke layar
        function renderGallery() {
            galleryGrid.innerHTML = ''; // Bersihkan layar terlebih dahulu
            fileCountDisplay.innerText = `${savedMedia.length} File`;

            if (savedMedia.length === 0) {
                galleryGrid.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        Belum ada media yang diunggah. Silakan unggah file pertama Anda.
                    </div>`;
                return;
            }

            // Tampilkan dari data yang paling baru (di-reverse)
            [...savedMedia].reverse().forEach(media => {
                const card = document.createElement('div');
                card.className = 'media-card';

                let mediaElement = '';
                if (media.type.startsWith('image/')) {
                    mediaElement = `<img src="${media.data}" alt="${media.name}">`;
                } else if (media.type.startsWith('video/')) {
                    mediaElement = `<video src="${media.data}" controls></video>`;
                }

                card.innerHTML = `
                    ${mediaElement}
                    <div class="media-info">
                        <div class="media-title">${media.name}</div>
                        <div class="media-type">${media.type.split('/')[0]}</div>
                        <button class="delete-btn" onclick="deleteMedia('${media.id}')">Hapus</button>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // 3. Fungsi untuk menghapus media
        window.deleteMedia = function(id) {
            savedMedia = savedMedia.filter(media => media.id !== id); // Buang data yang dihapus
            localStorage.setItem('cloudbox_media', JSON.stringify(savedMedia)); // Simpan ulang ke browser
            renderGallery(); // Perbarui tampilan
        };

        // 4. Ketika ada file yang diunggah
        mediaUpload.addEventListener('change', function(event) {
            const files = event.target.files;
            
            if (files.length > 0) {
                Array.from(files).forEach(file => {
                    // Gunakan FileReader untuk mengubah file fisik menjadi teks (Base64) agar bisa disimpan di LocalStorage
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const base64Data = e.target.result;
                        
                        const newMedia = {
                            id: Date.now().toString() + Math.random().toString(36).substr(2, 9), // Buat ID unik
                            name: file.name,
                            type: file.type,
                            data: base64Data
                        };
                        
                        try {
                            savedMedia.push(newMedia);
                            localStorage.setItem('cloudbox_media', JSON.stringify(savedMedia)); // Simpan ke browser
                            renderGallery(); // Perbarui tampilan
                        } catch (error) {
                            // LocalStorage browser memiliki batas memori maksimal (sekitar ~5MB)
                            alert('Penyimpanan memori browser penuh!\n\n(Ini adalah batasan dari LocalStorage. Untuk menyimpan file berukuran besar seperti video, kita memerlukan Database Server di Cloud Hosting).');
                            savedMedia.pop(); // Batalkan penambahan ke memori
                        }
                    };
                    
                    reader.readAsDataURL(file); // Mulai proses konversi file
                });
                
                // Reset kolom input setelah selesai
                mediaUpload.value = '';
            }
        });

        // 5. Tampilkan galeri saat website pertama kali dibuka
        renderGallery();
    </script>

</body>
</html>
