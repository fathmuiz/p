<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox - Penyimpanan Media</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styling */
        header {
            width: 100%;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Content */
        main {
            width: 100%;
            max-width: 1000px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px dashed #D1D5DB;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background-color: #F8FAFC;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            color: white;
            background-color: var(--primary);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Gallery Section */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #E5E7EB;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .media-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            animation: fadeIn 0.5s ease-out;
        }

        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .media-card img, .media-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background-color: #000;
        }

        .media-info {
            padding: 1rem;
        }

        .media-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-type {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            text-transform: uppercase;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background-color: #E5E7EB;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>☁️ CloudBox</h1>
        <p>Demo Penyimpanan Media Berbasis Cloud</p>
    </header>

    <main>
        <!-- Area Upload -->
        <section class="upload-section">
            <div class="upload-icon">📁</div>
            <h2>Unggah File Anda</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Mendukung format gambar (JPG, PNG) dan Video (MP4)</p>
            
            <div class="upload-btn-wrapper">
                <button class="btn">Pilih Foto / Video</button>
                <!-- Input ini menerima multiple files (bisa pilih banyak sekaligus) -->
                <input type="file" id="mediaUpload" accept="image/*, video/*" multiple />
            </div>
        </section>

        <!-- Area Galeri -->
        <section>
            <div class="gallery-header">
                <h2>Galeri Tersimpan</h2>
                <span id="fileCount" style="color: var(--primary); font-weight: bold;">0 File</span>
            </div>
            
            <div class="gallery-grid" id="galleryGrid">
                <div class="empty-state" id="emptyState">
                    Belum ada media yang diunggah. Silakan unggah file pertama Anda.
                </div>
            </div>
        </section>
    </main>

    <script>
        const mediaUpload = document.getElementById('mediaUpload');
        const galleryGrid = document.getElementById('galleryGrid');
        const emptyState = document.getElementById('emptyState');
        const fileCountDisplay = document.getElementById('fileCount');
        
        let totalFiles = 0;

        mediaUpload.addEventListener('change', function(event) {
            const files = event.target.files;
            
            if (files.length > 0) {
                // Sembunyikan tulisan "Belum ada media"
                if (emptyState) {
                    emptyState.style.display = 'none';
                }

                // Proses setiap file yang diunggah
                Array.from(files).forEach(file => {
                    totalFiles++;
                    fileCountDisplay.innerText = `${totalFiles} File`;

                    // Membuat URL sementara dari file yang diunggah di browser
                    const fileURL = URL.createObjectURL(file);
                    
                    // Membuat elemen kartu (card)
                    const card = document.createElement('div');
                    card.className = 'media-card';

                    // Cek apakah file adalah gambar atau video
                    let mediaElement = '';
                    if (file.type.startsWith('image/')) {
                        mediaElement = `<img src="${fileURL}" alt="${file.name}">`;
                    } else if (file.type.startsWith('video/')) {
                        mediaElement = `<video src="${fileURL}" controls></video>`;
                    }

                    // Isi HTML ke dalam kartu
                    card.innerHTML = `
                        ${mediaElement}
                        <div class="media-info">
                            <div class="media-title">${file.name}</div>
                            <div class="media-type">${file.type.split('/')[0]}</div>
                        </div>
                    `;

                    // Tambahkan kartu ke dalam galeri (di urutan paling depan)
                    galleryGrid.prepend(card);
                });
            }
        });
    </script>

</body>
</html>
